name: CI — Tests and Vercel Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run tests
        run: npm test -- --ci --runInBand

  deploy:
    name: Deploy to Vercel
    needs: tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Prisma migrations (if DATABASE_URL provided)
        if: ${{ secrets.DATABASE_URL != '' || env.DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || env.DATABASE_URL }}
        run: |
          npx prisma migrate deploy

      - name: Load .env into workflow env (optional)
        # This step reads a committed .env file and exports variables into the workflow environment.
        # WARNING: committing secrets in .env is insecure. Prefer GitHub repository secrets.
        if: ${{ always() }}
        run: |
          if [ -f .env ]; then
            echo "Loading .env file into workflow environment"
            # Export each non-comment, non-empty line into GITHUB_ENV
            grep -v '^\s*#' .env | grep -v '^\s*$' | while IFS='=' read -r name value; do
              # strip surrounding quotes from value
              value="${value#\"}"
              value="${value%\"}"
              echo "$name=$value" >> $GITHUB_ENV
            done
          else
            echo ".env not found, skipping"
          fi

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          # Prefer GitHub Secrets (secrets.*). If not set, fall back to variables loaded from .env via env.*
          vercel-token: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_TOKEN || env.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_ORG_ID || env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID != '' && secrets.VERCEL_PROJECT_ID || env.VERCEL_PROJECT_ID }}
          working-directory: .
          prod: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_TOKEN || env.VERCEL_TOKEN }}
